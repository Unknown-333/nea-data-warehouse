services:
  # ──────────────────────────────────────────────
  # PostgreSQL 15 — Data Warehouse
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: nea_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nea_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-nea_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nea_admin} -d ${POSTGRES_DB:-nea_warehouse}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Metabase v0.48 — BI Dashboard
  # ──────────────────────────────────────────────
  metabase:
    image: metabase/metabase:v0.49.22
    container_name: nea_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-nea_admin}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-changeme}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Airflow Init — First-time setup
  # ──────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    container_name: nea_airflow_init
    entrypoint: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@localhost"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-nea_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nea_warehouse}
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow-logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Airflow Webserver — DAG UI
  # ──────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: nea_airflow_webserver
    restart: unless-stopped
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-nea_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nea_warehouse}
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-nea_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-nea_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow-logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Airflow Scheduler — DAG execution
  # ──────────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    container_name: nea_airflow_scheduler
    restart: unless-stopped
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-nea_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nea_warehouse}
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-nea_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-nea_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow-logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  pgdata:
    driver: local
  airflow-logs:
    driver: local
