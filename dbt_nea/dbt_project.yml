name: 'nea_warehouse'
version: '1.0.0'
config-version: 2

profile: 'nea_warehouse'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Model configurations
models:
  nea_warehouse:
    staging:
      +schema: analytics
      +materialized: view
    dimensions:
      +schema: analytics
      +materialized: table
    facts:
      +schema: analytics
      +materialized: table
