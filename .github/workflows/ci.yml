name: CI — Pytest & dbt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nea_warehouse
          POSTGRES_USER: nea_admin
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nea_admin -d nea_warehouse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: nea_warehouse
      POSTGRES_USER: nea_admin
      POSTGRES_PASSWORD: ci_test_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/test_extract.py -v --tb=short

      - name: Initialize database schema
        run: |
          PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U $POSTGRES_USER -d $POSTGRES_DB -f db/init.sql

      - name: Extract sample PDFs
        run: python -m extractor.extract

      - name: Load data into PostgreSQL
        run: python db/load.py

      - name: Run dbt build
        working-directory: dbt_nea
        run: |
          dbt run --profiles-dir .
          dbt test --profiles-dir .
